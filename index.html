<!DOCTYPE html>

<html>

<head>
    <title>EcoWrap: Food-pHreshness QR-Tag</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="designEcoWrap.css">



</head>

<body>

<div class="header">    

    <h1>EcoWrap: Food-pHreshness QR-Tag</h1>

</div>

<div id="info" style="margin-top:20px"> <p>Loading...</p> </div>

<div id="claimForm" style="display:none">

    <input id="foodName" placeholder="Food name">

    <input type="datetime-local" id="prepTime">

    <input type="datetime-local" id="bestBefore">

    <input id="details" placeholder="Details">

    <button onclick="claimItem()">Claim</button>

</div>

<script type="module" src="script.js"></script>

<div style="margin-top:20px; text-align:center; color: black">

<h3>Test a Serial Code</h3>

<input id="testCode" placeholder="Enter serial code">

<button onclick="goToCode()">Open</button>

</div>

<div class="footer">

    <h2>EcoWrap   by   pHreshLab</h2>    

</div>

</body>
</html>
